name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 8 * * 1'  # Weekly Monday 8:23am UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Two audit-hygiene fixes (2026-07-07):
        # 1. Dropped 'safety' — it was installed but never run (pip-audit is the scanner) and it
        #    transitively pulled nltk>=3.9, whose only release (3.9.4) has an UNFIXABLE path-traversal
        #    advisory (PYSEC-2026-597, no patched version). nltk is not a pdfmux dep; pdfmux never calls it.
        # 2. Upgrade pip first so the runner's own pip is current — resolves fixable pip advisories
        #    (e.g. PYSEC-2026-196, fixed in 26.1.2) at the root instead of accumulating --ignore-vuln.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pip-audit

      - name: pip-audit (known vulnerabilities)
        # --skip-editable: skip the local pdfmux package itself (not on PyPI at push time)
        # --strict removed: conflicts with --skip-editable (strict exits non-zero on any skipped pkg)
        # Ignore pip's own CVE-2026-3219 (no fix version released yet — runner installs pip itself)
        run: pip-audit --desc --skip-editable --ignore-vuln PYSEC-2026-3219 --ignore-vuln CVE-2026-3219

      - name: Check for typosquatting in deps
        run: |
          echo "Checking direct dependencies for typosquatting..."
          pip install pipreqs 2>/dev/null
          # Verify all deps resolve to expected packages
          pip install --dry-run -e "." 2>&1 | grep -i "WARNING\|ERROR" || echo "✓ No suspicious packages"

      - name: Verify package integrity
        run: |
          echo "Verifying installed package hashes..."
          pip freeze | head -20
          echo "✓ Dependency audit complete"
